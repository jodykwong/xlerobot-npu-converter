[tool:pytest]
# pytest配置文件

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=85
    --cov-branch

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试 (运行时间 > 1秒)
    benchmark: 性能基准测试
    docker: 需要Docker环境的测试
    network: 需要网络连接的测试
    gpu: 需要GPU支持的测试

# 最小版本要求
minversion = 7.0

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:distutils

# 测试覆盖率配置
[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */site-packages/*
    */migrations/*
    */venv/*
    */env/*
    setup.py

branch = True

[coverage:report]
# 排除模块
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# 精确度
precision = 2

# 显示缺失的行
show_missing = True

# 跳过空文件
skip_empty = True

# 包覆盖率阈值
fail_under = 85

[coverage:html]
directory = htmlcov
title = XLeRobot NPU Converter - Coverage Report

[coverage:xml]
output = coverage.xml