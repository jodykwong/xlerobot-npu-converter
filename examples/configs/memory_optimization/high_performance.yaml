# 高性能模式配置
# 适用于大模型转换
# 版本: 1.0
# 日期: 2025-10-28

# === 基础配置 ===
optimization_level: aggressive
memory_mode: high_performance

# === 内存监控配置 ===
monitoring_enabled: true
monitoring_interval: 0.2
peak_memory_threshold: 0.90

# === 内存分配优化配置 ===
memory_pool_enabled: true
memory_pool_size: 524288000  # 500MB (字节)
object_reuse_enabled: true
object_reuse_threshold: 200

# === 算子级优化配置 ===
operator_optimization_enabled: true
intermediate_result_reuse: true
memory_compression_enabled: true
compute_memory_tradeoff: 0.6

# === 批处理配置 ===
batch_processing_enabled: true
batch_size: 8
dynamic_batch_adjustment: true
batch_memory_limit: 4294967296  # 4GB (字节)

# === GC优化配置 ===
gc_optimization_enabled: true
gc_threshold_adjustment: true
reference_counting_optimization: true
cycle_detection_enabled: true
gc_aggressiveness: 0.7

# === 大模型分片配置 ===
model_sharding_enabled: true
shard_size_threshold: 1073741824  # 1GB (字节)
max_shards: 16

# === 泄漏检测配置 ===
leak_detection_enabled: true
leak_detection_interval: 2.0
leak_threshold: 20971520  # 20MB (字节)
out_of_bounds_detection: true

# === 报告配置 ===
reporting_enabled: true
report_format:
  - json
  - html
auto_report_generation: true
