# VITS-Cantonese TTS Default Configuration
# Story 2.2: VITS-Cantonese TTS Complete Conversion Implementation
# Generated: 2025-10-27

model:
  type: vits_cantonese
  language: cantonese
  voice_type: female  # Options: male, female, child, neutral
  version: "1.0.0"

conversion:
  level: production  # Options: basic, standard, enhanced, production
  input_format: onnx
  output_format: bpu
  target_hardware: horizon_x5
  optimization:
    tone_modeling: true
    prosody_optimization: true
    voice_optimization: true

parameters:
  sample_rate: 44100
  bit_depth: 16
  channels: 1
  batch_size: 1
  max_sequence_length: 1000

cantonese_specific:
  prosody_profile: neutral  # Options: neutral, formal, casual, expressive
  tone_accuracy_target: 0.95
  semantic_accuracy_target: 0.90
  audio_quality_target: 8.5

validation:
  strict_mode: true
  precision_threshold: 0.98
  success_rate_threshold: 0.95
  validation_level: strict

output:
  formats:
    - json
    - html
    - pdf
  include_metrics: true
  include_optimization_details: true

# PRD Requirements Tracking
prd_requirements:
  conversion_success_rate: ">95%"
  performance_improvement: "2-5x"
  precision_maintenance: ">98%"
  audio_quality: ">8.5/10"
