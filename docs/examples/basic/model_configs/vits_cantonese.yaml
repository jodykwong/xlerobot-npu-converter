# XLeRobot VITS-Cantonese TTS模型配置
# 粤语语音合成模型配置模板

project:
  name: "vits_cantonese_model"
  version: "1.0.0"
  model_type: "vits_cantonese"
  description: "粤语语音合成模型配置"
  author: "XLeRobot Team"
  created_date: "2025-10-26"

hardware:
  # 目标设备配置
  target_device: "horizon_x5"        # 地平线X5 NPU
  optimization_level: "O2"           # 优化级别: O0, O1, O2, O3
  memory_limit: "8GB"                # 内存限制
  compute_units: 10                  # 计算单元数量
  cache_size: "256MB"                # 缓存大小
  thermal_management: true           # 热管理
  power_optimization: true           # 功耗优化

conversion_params:
  # 模型转换参数
  input_format: "onnx"               # 输入格式
  output_format: "bpu"               # 输出格式 (BPU格式)
  precision: "int8"                  # 量化精度: int8, fp16
  calibration_method: "minmax"       # 校准方法: minmax, kl, entropy
  calibration_dataset_size: 1000     # 校准数据集大小
  batch_size: 1                      # 批处理大小
  num_workers: 4                     # 工作线程数
  enable_profiling: false            # 是否启用性能分析

model_specific:
  vits_cantonese:
    # VITS模型架构配置
    inter_channels: 192              # 中间层通道数
    hidden_channels: 192             # 隐藏层通道数
    filter_channels: 768             # 滤波器通道数
    n_heads: 2                       # 注意力头数
    n_layers: 4                      # 层数
    kernel_size: 3                   # 卷积核大小
    p_dropout: 0.1                   # Dropout概率
    resblock: "1"                    # 残差块类型
    resblock_kernel_sizes: [3, 7, 11] # 残差块卷积核大小
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]] # 残差块膨胀率
    upsample_rates: [8, 8, 2, 2]     # 上采样率
    upsample_initial_channel: 512    # 上采样初始通道数
    upsample_kernel_sizes: [16, 16, 4, 4] # 上采样卷积核大小
    n_layers_q: 3                    # 量化器层数
    use_spectral_norm: false         # 是否使用谱归一化
    gin_channels: 256                # GIN通道数

    # 音频处理参数 (粤语优化)
    sampling_rate: 22050             # 采样率 (Hz)
    filter_length: 1024              # 滤波器长度
    hop_length: 256                  # 跳跃长度
    win_length: 1024                 # 窗口长度
    n_mel_channels: 80               # Mel频谱通道数
    mel_fmin: 0.0                    # Mel频率最小值
    mel_fmax: 8000.0                 # Mel频率最大值
    max_wav_value: 32768.0           # 波形最大值
    normalize: true                  # 是否归一化
    trim_silence: true               # 是否裁剪静音
    trim_threshold: 0.01             # 静音裁剪阈值

    # 语音特征配置
    speaker_embedding_size: 192      # 说话人嵌入维度
    num_speakers: 1                  # 说话人数量
    speaker_id: 0                    # 默认说话人ID
    use_speaker_embedding: true      # 是否使用说话人嵌入

    # 粤语TTS合成参数
    noise_scale: 0.667               # 噪声缩放因子
    noise_scale_w: 0.8               # 噪声缩放因子(w)
    length_scale: 1.0                # 长度缩放因子
    inference_noise_scale: 0.667     # 推理噪声缩放

    # 粤语语音学配置
    cantonese_vocab_size: 5000       # 粤语词汇表大小
    phoneme_set: "jyutping_extended" # 音素集: jyutping, jyutping_extended
    phoneme_language: "cantonese"    # 音素语言
    phonemizer: "espeak"             # 音素化器
    tone_embedding: true             # 是否启用声调嵌入
    num_tones: 6                     # 声调数量 (粤语6声调)
    use_jyutping: true               # 是否使用粤拼
    character_coverage: 0.995        # 字符覆盖率

    # 数据预处理配置
    add_blank: true                  # 是否添加空白符
    n_speakers: 1                    # 说话人数量
    cleaned_text: true               # 是否清理文本

    # 高级功能配置
    use_sdp: true                    # 是否使用随机时长预测器
    deterministic_seed: 42           # 确定性种子
    max_decoder_steps: 2000          # 最大解码步数
    gate_threshold: 0.5              # 门控阈值
    temperature: 1.0                 # 温度参数

performance:
  # 性能目标配置
  target_latency_ms: 200            # 目标延迟 (毫秒)
  max_realtime_factor: 0.9          # 最大实时因子
  enable_streaming: true            # 是否启用流式处理
  chunk_size: 1024                  # 流式处理块大小
  memory_optimization: true         # 内存优化

validation:
  # 验证配置
  enable_model_validation: true     # 启用模型验证
  validate_audio_output: true       # 验证音频输出
  quality_thresholds:
    mos_score: 4.0                   # MOS评分阈值
    mcd_score: 4.5                   # MCD评分阈值
    cer_score: 0.05                  # CER阈值

debug:
  # 调试配置
  enabled: false                    # 调试开关
  log_level: "INFO"                 # 日志级别: DEBUG, INFO, WARNING, ERROR
  save_intermediate: false          # 保存中间结果
  profile_performance: false        # 性能分析

# 配置说明:
# 1. 此配置针对粤语语音合成进行了优化
# 2. 支持粤语的6声调系统
# 3. 使用jyutping_extended音素集，提供更精确的粤语发音
# 4. 包含完整的VITS模型架构参数
# 5. 支持多种性能优化选项
# 6. 包含完整的验证和调试配置