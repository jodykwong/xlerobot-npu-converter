# XLeRobot Piper VITS TTS模型配置
# 通用语音合成模型配置模板

project:
  name: "piper_vits_model"
  version: "1.0.0"
  model_type: "piper_vits"
  description: "通用语音合成模型配置"
  author: "XLeRobot Team"
  created_date: "2025-10-26"

hardware:
  # 目标设备配置
  target_device: "horizon_x5"        # 地平线X5 NPU
  optimization_level: "O2"           # 优化级别: O0, O1, O2, O3
  memory_limit: "8GB"                # 内存限制
  compute_units: 10                  # 计算单元数量
  cache_size: "256MB"                # 缓存大小
  thermal_management: true           # 热管理
  power_optimization: true           # 功耗优化

conversion_params:
  # 模型转换参数
  input_format: "onnx"               # 输入格式
  output_format: "bpu"               # 输出格式 (BPU格式)
  precision: "int8"                  # 量化精度: int8, fp16
  calibration_method: "minmax"       # 校准方法: minmax, kl, entropy
  calibration_dataset_size: 1000     # 校准数据集大小
  batch_size: 1                      # 批处理大小
  num_workers: 4                     # 工作线程数
  enable_profiling: false            # 是否启用性能分析

model_specific:
  piper_vits:
    # 基础音频参数
    sample_rate: 22050               # 采样率 (Hz)
    mel_channels: 80                 # Mel频谱通道数

    # 音频处理参数
    n_fft: 1024                      # FFT窗口大小
    hop_size: 256                    # 跳跃大小
    win_size: 1024                   # 窗口大小
    f_min: 0.0                       # 最低频率
    f_max: 8000.0                    # 最高频率
    n_mels: 80                       # Mel频谱通道数
    power: 1.0                       # 功率
    normalize: true                  # 是否归一化
    preemphasis: 0.0                 # 预加重
    preemphasize: false              # 是否应用预加重

    # 说话人配置
    speaker_embedding: true          # 是否使用说话人嵌入
    num_speakers: 1                  # 说话人数量
    speaker_id: 0                    # 默认说话人ID
    embedding_dim: 192               # 嵌入维度
    speaker_embedding_size: 192      # 说话人嵌入大小
    use_speaker_embedding: true      # 是否使用说话人嵌入

    # VITS架构参数
    inter_channels: 192              # 中间层通道数
    hidden_channels: 192             # 隐藏层通道数
    filter_channels: 768             # 滤波器通道数
    n_heads: 2                       # 注意力头数
    n_layers: 6                      # 层数
    kernel_size: 3                   # 卷积核大小
    p_dropout: 0.1                   # Dropout概率
    resblock: "1"                    # 残差块类型
    resblock_kernel_sizes: [3, 7, 11] # 残差块卷积核大小
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]] # 残差块膨胀率
    upsample_rates: [8, 8, 2, 2]     # 上采样率
    upsample_initial_channel: 512    # 上采样初始通道数
    upsample_kernel_sizes: [16, 16, 4, 4] # 上采样卷积核大小
    n_layers_q: 3                    # 量化器层数
    use_spectral_norm: false         # 是否使用谱归一化

    # 合成参数
    noise_scale: 0.667               # 噪声缩放因子
    noise_scale_d: 0.8               # 噪声缩放因子(d)
    length_scale: 1.0                # 长度缩放因子
    inference_noise_scale: 0.667     # 推理噪声缩放
    max_wav_value: 32768.0           # 波形最大值

    # 高级功能
    use_sdp: true                    # 是否使用随机时长预测器
    gin_channels: 256                # GIN通道数
    deterministic_seed: 42           # 确定性种子

    # 解码器参数
    max_decoder_steps: 2000          # 最大解码步数
    gate_threshold: 0.5              # 门控阈值
    temperature: 1.0                 # 温度参数

    # 音频后处理
    denoiser_strength: 0.1           # 降噪强度
    use_denoiser: true               # 是否使用降噪器
    audio_denoiser_enabled: true     # 音频降噪器开关

    # 语言和语音学配置
    language: "en"                   # 默认语言
    phoneme_id_map_length: 0         # 音素ID映射长度
    phoneme_range: [0, 0]            # 音素范围
    phoneme_set: "espeak"            # 音素集
    text_cleaners: ["cjke_cleaners2"] # 文本清理器

    # 数据处理
    add_blank: true                  # 是否添加空白符
    cleaned_text: true               # 是否清理文本
    use_phonemes: true               # 是否使用音素
    use_espeak_phonemes: true        # 是否使用espeak音素
    n_speakers: 1                    # 说话人数量

    # 模型优化
    checkpointing: true              # 是否使用检查点
    fp16_run: false                  # 是否使用FP16推理
    half: false                      # 是否半精度
    momentum: 0.0                    # 动量
    eps: 1e-9                        # 数值稳定性参数

    # 训练特定参数 (推理时可忽略)
    learning_rate: 2e-4              # 学习率
    weight_decay: 0.0                # 权重衰减
    grad_clip_thresh: 1.0            # 梯度裁剪阈值
    save_every: 1000                 # 保存间隔
    log_every: 200                   # 日志间隔
    iters_at_least: 0                # 最少迭代次数
    decay_learning_rate: true        # 是否衰减学习率
    init_learning_rate: -1           # 初始学习率
    warmup_iterations: 0             # 预热迭代次数

performance:
  # 性能目标配置
  target_latency_ms: 200            # 目标延迟 (毫秒)
  max_realtime_factor: 0.9          # 最大实时因子
  enable_streaming: true            # 是否启用流式处理
  chunk_size: 1024                  # 流式处理块大小
  memory_optimization: true         # 内存优化

validation:
  # 验证配置
  enable_model_validation: true     # 启用模型验证
  validate_audio_output: true       # 验证音频输出
  quality_thresholds:
    mos_score: 4.0                   # MOS评分阈值
    mcd_score: 4.5                   # MCD评分阈值
    cer_score: 0.05                  # CER阈值

debug:
  # 调试配置
  enabled: false                    # 调试开关
  log_level: "INFO"                 # 日志级别: DEBUG, INFO, WARNING, ERROR
  save_intermediate: false          # 保存中间结果
  profile_performance: false        # 性能分析
  save_spectrograms: false          # 保存频谱图

# 多语言支持配置 (可选)
multilingual:
  enabled: false                    # 是否启用多语言
  supported_languages: ["en", "es", "fr", "de", "it"] # 支持的语言
  language_embedding_dim: 64        # 语言嵌入维度
  default_language: "en"            # 默认语言

# 语音控制配置
voice_control:
  enabled: false                    # 是否启用语音控制
  speed_control: true               # 语速控制
  pitch_control: true               # 音调控制
  energy_control: true              # 能量控制
  emotion_control: false            # 情感控制

# 配置说明:
# 1. 此配置基于Piper VITS架构，支持通用语音合成
# 2. 支持多说话人和多语言功能 (可选启用)
# 3. 包含完整的音频后处理和降噪功能
# 4. 支持语音控制参数调节
# 5. 包含训练和推理两套参数，推理时可忽略训练参数
# 6. 提供多种性能优化选项