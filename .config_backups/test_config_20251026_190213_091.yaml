# Debug Test Configuration File for Story 1.4
# This file will NOT be automatically cleaned up for debugging

project:
  name: "debug_test_model"
  version: "1.0.0"
  model_type: "sensevoice"
  description: "Debug test configuration for validation"

hardware:
  target_device: "horizon_x5"
  optimization_level: "O2"
  memory_limit: "4GB"

conversion_params:
  input_format: "onnx"
  output_format: "bpu"
  quantization:
    enabled: true
    precision: "int8"
    calibration_method: "minmax"

performance:
  batch_size: 1
  num_workers: 2
  memory_limit: "4GB"
  target_latency_ms: 100

model_config:
  model_type: "sensevoice"
  input_format: "onnx"
  output_format: "bpu"
  model_path: null
  model_version: "1.0.0"
  sample_rate: 16000

model_specific:
  sensevoice:
    # Basic ASR parameters
    sample_rate: 16000
    audio_length: 30
    vocab_size: 10000
    mel_bins: 80
    frame_length: 25
    frame_shift: 10
    normalize: true
    preemphasis: 0.97
    n_fft: 512
    hop_length: 160
    win_length: 400
    n_mels: 80
    f_min: 0.0
    f_max: 8000.0

    # ASR-specific parameters
    language_detection: true
    supported_languages: ["zh", "en", "yue", "ja"]
    confidence_threshold: 0.8
    segmentation: true
    vad_enabled: true

    # Model optimization parameters
    beam_size: 5
    length_penalty: 1.0
    coverage_penalty: 1.0
    repetition_penalty: 1.0