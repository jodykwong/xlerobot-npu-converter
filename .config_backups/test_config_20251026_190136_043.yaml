# Debug Test Configuration File for Story 1.4
# This file will NOT be automatically cleaned up for debugging

project:
  name: "debug_test_model"
  version: "1.0.0"
  model_type: "sensevoice"
  description: "Debug test configuration for validation"

hardware:
  target_device: "horizon_x5"
  optimization_level: "O2"
  memory_limit: "4GB"

conversion_params:
  input_format: "onnx"
