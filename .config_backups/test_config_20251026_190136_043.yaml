  batch_size: 1
  num_workers: 2
  memory_limit: "4GB"
  target_latency_ms: 100

model_config:
  model_type: "sensevoice"
  input_format: "onnx"
  output_format: "bpu"
  model_path: null
  model_version: "1.0.0"