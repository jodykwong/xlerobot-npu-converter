# 默认算法扩展配置
# 为常用算法扩展提供预设配置

version: "1.0.0"
created_at: "2025-10-28T22:30:00Z"

# 算法扩展分类
algorithm_extensions:
  # 变换算法扩展
  transformer_variants:
    category: "transformation"
    name: "Transformer变种算法"
    description: "用于模型变换的Transformer变种算法"
    parameters:
      # 模型参数
      model_size:
        type: "str"
        required: true
        choices: ["small", "base", "large", "xl"]
        default: "base"
        description: "模型大小"

      num_layers:
        type: "int"
        required: false
        min: 1
        max: 100
        default: 12
        description: "Transformer层数"

      hidden_size:
        type: "int"
        required: false
        min: 128
        max: 4096
        default: 768
        description: "隐藏层维度"

      num_attention_heads:
        type: "int"
        required: false
        min: 1
        max: 64
        default: 12
        description: "注意力头数"

      # 优化参数
      optimization_level:
        type: "int"
        required: false
        min: 0
        max: 3
        default: 2
        description: "优化级别"

      precision:
        type: "str"
        required: false
        choices: ["fp32", "fp16", "int8"]
        default: "fp16"
        description: "计算精度"

      # 性能参数
      batch_size:
        type: "int"
        required: false
        min: 1
        max: 512
        default: 32
        description: "批处理大小"

      max_sequence_length:
        type: "int"
        required: false
        min: 1
        max: 8192
        default: 512
        description: "最大序列长度"

      # 并发参数
      num_workers:
        type: "int"
        required: false
        min: 1
        max: 32
        default: 4
        description: "并行工作线程数"

      # 缓存参数
      enable_cache:
        type: "bool"
        required: false
        default: true
        description: "启用结果缓存"

      cache_size:
        type: "int"
        required: false
        min: 0
        max: 100000
        default: 1000
        description: "缓存大小"

  # CNN改进算法扩展
  cnn_improvements:
    category: "optimization"
    name: "CNN改进算法"
    description: "用于卷积神经网络优化的算法"
    parameters:
      # 模型参数
      architecture:
        type: "str"
        required: true
        choices: ["resnet", "vgg", "mobilenet", "efficientnet", "custom"]
        default: "resnet"
        description: "CNN架构"

      num_layers:
        type: "int"
        required: false
        min: 1
        max: 200
        default: 50
        description: "网络层数"

      kernel_size:
        type: "int"
        required: false
        min: 1
        max: 15
        default: 3
        description: "卷积核大小"

      # 优化参数
      use_depthwise:
        type: "bool"
        required: false
        default: false
        description: "使用深度可分离卷积"

      use_se_block:
        type: "bool"
        required: false
        default: true
        description: "使用SE（Squeeze-and-Excitation）模块"

      use_skip_connection:
        type: "bool"
        required: false
        default: true
        description: "使用跳跃连接"

      # 性能参数
      input_size:
        type: "int"
        required: false
        min: 32
        max: 1024
        default: 224
        description: "输入图像大小"

      # 并发参数
      workers_per_gpu:
        type: "int"
        required: false
        min: 1
        max: 8
        default: 2
        description: "每个GPU的工作线程数"

  # RNN优化算法扩展
  rnn_optimizations:
    category: "optimization"
    name: "RNN优化算法"
    description: "用于循环神经网络优化的算法"
    parameters:
      # 模型参数
      rnn_type:
        type: "str"
        required: true
        choices: ["lstm", "gru", "rnn", "transformer"]
        default: "lstm"
        description: "RNN类型"

      num_layers:
        type: "int"
        required: false
        min: 1
        max: 10
        default: 3
        description: "RNN层数"

      hidden_size:
        type: "int"
        required: false
        min: 16
        max: 4096
        default: 256
        description: "隐藏层维度"

      # 优化参数
      use_bidirectional:
        type: "bool"
        required: false
        default: false
        description: "使用双向RNN"

      use_attention:
        type: "bool"
        required: false
        default: true
        description: "使用注意力机制"

      dropout_rate:
        type: "float"
        required: false
        min: 0.0
        max: 1.0
        default: 0.2
        description: "Dropout率"

      # 序列参数
      max_sequence_length:
        type: "int"
        required: false
        min: 1
        max: 10000
        default: 500
        description: "最大序列长度"

      padding_strategy:
        type: "str"
        required: false
        choices: ["post", "pre", "max_length"]
        default: "post"
        description: "填充策略"

# 高级功能配置
advanced_features:
  # A/B测试框架配置
  ab_testing:
    enabled: true
    test_duration: 3600  # 秒
    significance_level: 0.05
    min_samples: 1000
    metrics:
      - "accuracy"
      - "latency"
      - "throughput"
      - "memory_usage"

  # 性能分析配置
  performance_analysis:
    enabled: true
    sample_rate: 0.1  # 10%的请求采样
    metrics_interval: 60  # 秒
    export_format: "json"
    metrics:
      - "execution_time"
      - "memory_usage"
      - "cpu_usage"
      - "gpu_usage"

  # 建议系统配置
  recommendation:
    enabled: true
    algorithm_selection_strategy: "auto"
    recommendation_history: true
    max_recommendations: 5
    confidence_threshold: 0.7

  # 自动调优配置
  auto_tuning:
    enabled: true
    tuning_strategy: "bayesian"
    max_iterations: 100
    convergence_threshold: 0.001
    objective_metric: "accuracy"
    objective_direction: "maximize"

# 默认验证规则
validation_rules:
  # 全局约束
  global:
    max_batch_size: 1024
    max_memory_usage: 16384  # MB
    max_execution_time: 300  # 秒

  # 模型特定约束
  model_specific:
    transformer:
      max_sequence_length: 8192
      max_model_size: 10240  # MB

    cnn:
      max_input_size: 1024
      max_num_layers: 200

    rnn:
      max_sequence_length: 10000
      max_num_layers: 50

# 性能基准
performance_benchmarks:
  # 基准测试配置
  baseline_tests:
    enabled: true
    test_datasets: ["small", "medium", "large"]
    iterations: 10
    warmup_iterations: 3

  # 性能目标
  performance_targets:
    transformer:
      latency_p99: 100  # ms
      throughput: 1000  # samples/s
      memory_usage: 4096  # MB

    cnn:
      latency_p99: 50  # ms
      throughput: 2000  # samples/s
      memory_usage: 2048  # MB

    rnn:
      latency_p99: 200  # ms
      throughput: 500  # samples/s
      memory_usage: 3072  # MB

# 集成配置
integrations:
  # 与现有系统集成
  existing_systems:
    epic_1:
      enabled: true
      components: ["core_framework", "config_management"]
    epic_2:
      enabled: true
      components: ["conversion_system", "validation_system"]
    story_3_1:
      enabled: true
      components: ["performance_monitoring"]
    story_3_2:
      enabled: true
      components: ["memory_optimization"]
    story_3_3:
      enabled: true
      components: ["concurrent_processing"]

  # 配置同步
  config_sync:
    enabled: true
    auto_sync: true
    sync_interval: 300  # 秒
