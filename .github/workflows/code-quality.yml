name: Code Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史记录以进行深度分析

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Check code formatting with Black
      run: |
        black --check --diff --color src/ tests/
        echo "Black formatting check completed"

    - name: Lint with Ruff
      run: |
        ruff check src/ tests/ --output-format=github --show-fixes
        echo "Ruff linting completed"

    - name: Type checking with Mypy
      run: |
        mypy src/ --ignore-missing-imports --show-error-codes
        echo "MyPy type checking completed"

    - name: Security scan with Bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json
        echo "Bandit security scan completed"

    - name: Check for secrets
      run: |
        pip install detect-secrets
        detect-secrets scan --all-files --baseline .secrets.baseline src/ || true
        echo "Secret detection completed"

    - name: Check dependency vulnerabilities
      run: |
        pip install safety
        safety check --json --output safety-report.json
        echo "Dependency vulnerability check completed"

    - name: Analyze code complexity
      run: |
        pip install radon
        radon cc src/ --min B --json > radon-report.json || true
        echo "Code complexity analysis completed"

    - name: Check docstring coverage
      run: |
        pip install interrogate
        interrogate src/ --fail-under 80 || true
        echo "Docstring coverage check completed"

    - name: Generate code quality report
      run: |
        python -c "
import json
import os

# 读取各种报告文件
reports = {}
if os.path.exists('bandit-report.json'):
    with open('bandit-report.json') as f:
        reports['bandit'] = json.load(f)

if os.path.exists('safety-report.json'):
    with open('safety-report.json') as f:
        reports['safety'] = json.load(f)

if os.path.exists('radon-report.json'):
    with open('radon-report.json') as f:
        reports['radon'] = json.load(f)

# 生成综合报告
summary = {
    'timestamp': '$(date -u +"%Y-%m-%dT%H:%M:%SZ")',
    'commit_sha': '$GITHUB_SHA',
    'branch': '$GITHUB_REF_NAME',
    'reports': reports
}

with open('code-quality-report.json', 'w') as f:
    json.dump(summary, f, indent=2)

print('Code quality report generated')
"

    - name: Upload code quality reports
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-reports
        path: |
          bandit-report.json
          safety-report.json
          radon-report.json
          code-quality-report.json
        retention-days: 30

    - name: Comment PR with quality metrics
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');

          if (fs.existsSync('code-quality-report.json')) {
            const report = JSON.parse(fs.readFileSync('code-quality-report.json', 'utf8'));

            let comment = '## Code Quality Report 📊\n\n';

            // Black格式化检查
            comment += '### 🎨 Code Formatting\n';
            comment += '✅ Black formatting check passed\n\n';

            // Ruff检查结果
            comment += '### 🔍 Linting (Ruff)\n';
            comment += '✅ Ruff linting completed\n\n';

            // MyPy类型检查
            comment += '### 📝 Type Checking (MyPy)\n';
            comment += '✅ Type checking completed\n\n';

            // 安全扫描结果
            if (report.reports.bandit) {
              const bandit = report.reports.bandit;
              comment += `### 🔒 Security Scan (Bandit)\n`;
              comment += `Issues found: ${bandit.metrics['totals']['loc']}\n`;
              comment += `Security issues: ${bandit.results.length}\n\n`;
            }

            // 依赖漏洞检查
            if (report.reports.safety) {
              const safety = report.reports.safety;
              comment += `### 🛡️ Dependency Vulnerabilities (Safety)\n`;
              comment += `Vulnerabilities found: ${safety.vulnerabilities.length}\n\n`;
            }

            // 代码复杂度
            if (report.reports.radon) {
              const radon = report.reports.radon;
              comment += `### 📈 Code Complexity (Radon)\n`;
              comment += `Average complexity: ${radon.metrics['average_cc']}\n\n`;
            }

            comment += '---\n';
            comment += '*This comment was automatically generated by the code quality workflow.*';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } else {
            console.log('No code quality report found');
          }